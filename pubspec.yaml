name: playzone
description: "A new Flutter project."
publish_to: 'none'

version: 2.0.2+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  webview_flutter: ^4.7.0
  smooth_page_indicator: ^1.2.0
  shared_preferences: ^2.2.2
  connectivity_plus: ^7.0.0
  http: ^1.2.2
  flutter_inappwebview: ^6.0.0
  file_picker: ^10.3.7
  permission_handler: ^12.0.1
  url_launcher: ^6.2.0
  dio: ^5.4.0
  image_picker: ^1.0.7
  mime: ^1.0.5
  http_parser: ^4.0.2
  path: ^1.9.0
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/img.png"

flutter:
  uses-material-design: true
  assets:
    - assets/onboarding/
    - assets/images/